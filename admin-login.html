<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin login — Elpys</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="elpys-favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-section { padding: 3rem 0 4rem; }
    .auth-wrap { max-width: 440px; }
    .auth-section h1 { font-size: clamp(1.375rem, 3vw, 1.75rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .auth-intro { font-size: 0.9375rem; color: #444; line-height: 1.6; margin-bottom: 2rem; }
    .auth-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.8125rem; font-weight: 600; }
    .field input { font-family: inherit; font-size: 0.9375rem; color: var(--body); background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.55rem 0.75rem; width: 100%; }
    .field input:focus { outline: 2px solid var(--body); outline-offset: 1px; }
    .submit-btn { align-self: flex-start; font-family: inherit; font-size: 0.9375rem; font-weight: 600; color: var(--white); background: var(--body); border: none; border-radius: var(--radius); padding: 0.65rem 1.5rem; cursor: pointer; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .form-status { font-size: 0.9375rem; padding: 1rem; border-radius: var(--radius); display: none; }
    .form-status.error { background: #FEF2F2; border: 1px solid #FCA5A5; color: #991B1B; }
    .auth-switch { margin-top: 1.5rem; font-size: 0.9rem; color: var(--muted); }
    .auth-switch a { color: var(--body); text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="header-inner">
      <a href="index.html" class="site-name"><img src="elpys-logo-mark.svg" class="site-logo" alt="" aria-hidden="true">Elpys</a>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="auth-section">
    <div class="auth-wrap">
      <h1>Admin login</h1>
      <p class="auth-intro">For site administrators only.</p>

      <div class="form-status" id="form-status"></div>

      <form class="auth-form" id="login-form" novalidate>
        <div class="field">
          <label for="li-password">Password</label>
          <input type="password" id="li-password" name="password" required autocomplete="current-password" placeholder="Admin password">
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Log in →</button>
      </form>

      <p class="auth-switch"><a href="login.html">← Back to regular login</a></p>
    </div>
  </section>
</div>

<footer>
  <div class="wrap">
    <div class="footer-inner">
      <p>All listings verified June 2026. Links and details may change — always confirm with the org before your first visit.</p>
      <a href="submit.html">Submit an opportunity</a>
    </div>
  </div>
</footer>

<script>
  var form     = document.getElementById('login-form');
  var btn      = document.getElementById('submit-btn');
  var statusEl = document.getElementById('form-status');

  function showError(msg) {
    statusEl.textContent   = msg;
    statusEl.className     = 'form-status error';
    statusEl.style.display = 'block';
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    statusEl.style.display = 'none';

    var password = form.elements.password.value;
    if (!password) return showError('Please enter the admin password.');

    btn.disabled    = true;
    btn.textContent = 'Logging in…';

    try {
      var res = await fetch('/api/admin-login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ password: password }),
      });

      if (res.status === 401) {
        showError('Incorrect password.');
        btn.disabled    = false;
        btn.textContent = 'Log in →';
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);

      sessionStorage.setItem('elpys_admin_pw', password);
      location.replace('index.html');
    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
      btn.disabled    = false;
      btn.textContent = 'Log in →';
    }
  });
</script>
<script src="beta-banner.js"></script>

</body>
</html>
