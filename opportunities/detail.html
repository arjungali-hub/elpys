<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elpys</title>
  <!-- noindex: remove this tag when ready to launch publicly -->
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>

<header>
  <div class="wrap">
    <div class="header-inner">
      <a href="../index.html" class="site-name">Elpys</a>
      <span class="header-sub">Volunteer opportunities for teens</span>
    </div>
  </div>
</header>

<div class="wrap">
  <section class="detail-section" id="detail-section">
    <a href="../index.html" class="back-link">← Back to all opportunities</a>
    <p id="loading-msg" style="color:#666;margin-top:1rem;">Loading…</p>
  </section>
</div>

<footer>
  <div class="wrap">
    <div class="footer-inner">
      <p>All listings verified June 2026. Links and details may change — always confirm with the org before your first visit.</p>
      <a href="../submit.html">Submit an opportunity</a>
    </div>
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="../supabase-client.js"></script>
<script src="../mini-map.js"></script>
<script>
  (async () => {
    const slug = new URLSearchParams(window.location.search).get('slug');
    const section = document.getElementById('detail-section');

    if (!slug) {
      document.getElementById('loading-msg').textContent = 'No opportunity specified.';
      return;
    }

    let opp;
    try {
      const all = await fetchOpportunities();
      opp = all.find(o => o.slug === slug);
    } catch (e) {
      document.getElementById('loading-msg').textContent = 'Could not load opportunity data.';
      return;
    }

    if (!opp) {
      document.getElementById('loading-msg').textContent = 'Opportunity not found.';
      return;
    }

    // Update page title
    document.title = opp.name + ' — Elpys';

    // Build steps HTML
    const stepsHtml = opp._steps.length
      ? '<ol class="steps">' +
          opp._steps.map((s, i) =>
            '<li><span class="n">' + (i + 1) + '</span><span>' + esc(s) + '</span></li>'
          ).join('') +
        '</ol>'
      : '';

    // Build the note if present
    const noteHtml = opp._note
      ? '<p style="font-size:0.875rem;color:#555;margin-top:0.75rem;">' + esc(opp._note) + '</p>'
      : '';

    // Build contact-for-questions line if present
    const contactHtml = opp._contactInfo
      ? '<p style="font-size:0.875rem;color:#555;margin-top:0.75rem;"><strong>Questions?</strong> ' + esc(opp._contactInfo) + '</p>'
      : '';

    // Build when/where/age row if any fields are populated
    const metaItems = [];
    if (opp._ageHtml)  metaItems.push('<span><strong>Age:</strong> ' + opp._ageHtml + '</span>');
    if (opp._when)     metaItems.push('<span><strong>When:</strong> ' + esc(opp._when) + '</span>');
    if (opp._where)    metaItems.push('<span><strong>Where:</strong> ' + esc(opp._where) + '</span>');
    const metaHtml = metaItems.length
      ? '<div class="detail-meta" style="display:flex;flex-wrap:wrap;gap:0.4rem 1.5rem;font-size:0.875rem;color:#444;margin:0.75rem 0 1rem;">' + metaItems.join('') + '</div>'
      : '';

    document.getElementById('loading-msg').remove();

    const content = document.createElement('div');
    content.innerHTML =
      '<div class="detail-layout">' +
        '<div class="detail-main">' +
          '<span class="detail-tag">' + esc(opp.tag) + '</span>' +
          '<h1>' + esc(opp.name) + '</h1>' +
          metaHtml +
          '<p class="detail-desc">' + esc(opp._detailDesc) + '</p>' +
        '</div>' +
        '<div class="detail-box">' +
          '<p class="steps-label">How to sign up</p>' +
          stepsHtml +
          noteHtml +
          '<div class="card-actions" style="margin-top:1rem;">' +
            '<a class="btn" href="' + esc(opp._signupLink) + '" target="_blank" rel="noopener">' + esc(opp._signupLabel) + '</a>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="mini-map-wrap" id="mini-map-host">' +
        '<div class="mini-map" id="mini-map"></div>' +
      '</div>' +
      '<p class="mini-map-label">View on full map →</p>' +
      contactHtml;

    section.appendChild(content);

    renderSingleMiniMap('mini-map', slug, '../map.html');
  })();

  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
<script src="../beta-banner.js"></script>

</body>
</html>
