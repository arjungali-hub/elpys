<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Elpys</title>
  <link rel="icon" type="image/svg+xml" href="elpys-favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #F7F7F7; color: #1A1A1A; line-height: 1.5; font-size: 15px; padding: 2rem 1rem 4rem; }
    h1 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.875rem; margin-bottom: 1.75rem; }

    /* Login */
    #login-panel { max-width: 340px; }
    .login-row { display: flex; gap: 0.5rem; }
    .login-row input { flex: 1; font-family: inherit; font-size: 0.9375rem; border: 1px solid #D1D5DB; border-radius: 6px; padding: 0.5rem 0.75rem; }
    .login-row input:focus { outline: 2px solid #1A1A1A; outline-offset: 1px; }
    .btn-primary { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #fff; background: #1A1A1A; border: none; border-radius: 6px; padding: 0.55rem 1rem; cursor: pointer; white-space: nowrap; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Messages */
    .msg { font-size: 0.875rem; margin-top: 0.75rem; padding: 0.65rem 0.85rem; border-radius: 6px; display: none; }
    .msg.error   { background: #FEF2F2; border: 1px solid #FCA5A5; color: #991B1B; display: block; }

    /* Panels */
    #submissions-panel { display: none; }
    #published-panel   { display: none; margin-top: 2.75rem; padding-top: 2.75rem; border-top: 1px solid #E5E7EB; }
    #feedback-panel    { display: none; margin-top: 2.75rem; padding-top: 2.75rem; border-top: 1px solid #E5E7EB; }

    /* Section jump nav */
    #section-nav { display: none; margin-bottom: 2rem; display: none; gap: 0.5rem; flex-wrap: wrap; }
    #section-nav a { font-size: 0.8125rem; font-weight: 600; color: #374151; background: #F3F4F6; border: 1px solid #E5E7EB; border-radius: 6px; padding: 0.35rem 0.75rem; text-decoration: none; }
    #section-nav a:hover { background: #E5E7EB; }
    .feedback-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; max-width: 820px; }
    .feedback-card .fb-message { font-size: 0.9375rem; color: #1A1A1A; line-height: 1.55; margin-bottom: 0.5rem; }
    .feedback-card .fb-meta { font-size: 0.8125rem; color: #666; display: flex; flex-wrap: wrap; gap: 0.3rem 1rem; margin-bottom: 0.65rem; }
    .feedback-card .fb-meta a { color: #1E40AF; word-break: break-all; }
    .section-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1.25rem; }
    .section-header h2 { font-size: 1rem; font-weight: 700; }
    .count-badge { font-size: 0.75rem; background: #E5E7EB; color: #374151; border-radius: 999px; padding: 0.15rem 0.6rem; font-weight: 600; }

    /* Cards */
    .submission-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 8px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; max-width: 820px; }
    .sub-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.15rem; }
    .sub-meta { font-size: 0.8125rem; color: #555; margin-bottom: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem 1rem; }
    .sub-meta span::before { content: '· '; color: #aaa; }
    .sub-meta span:first-child::before { content: ''; }
    .sub-desc { font-size: 0.875rem; color: #333; margin-bottom: 0.75rem; line-height: 1.55; }
    .sub-steps { font-size: 0.8125rem; color: #444; padding-left: 1.1rem; margin-bottom: 0.75rem; }
    .sub-steps li { margin-bottom: 0.2rem; }
    .sub-note { font-size: 0.8125rem; color: #666; font-style: italic; margin-bottom: 0.75rem; }
    .sub-links { font-size: 0.8125rem; margin-bottom: 1rem; }
    .sub-links a { color: #1A1A1A; text-decoration: underline; margin-right: 1rem; }

    /* Pending approve fields */
    .approve-fields { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 6px; padding: 0.85rem 1rem; margin-bottom: 0.85rem; }
    .approve-fields > p { font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 0.6rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .approve-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: flex-end; }
    .approve-field { display: flex; flex-direction: column; gap: 0.25rem; }
    .approve-field label { font-size: 0.75rem; font-weight: 600; color: #555; }
    .approve-field input { font-family: inherit; font-size: 0.875rem; border: 1px solid #D1D5DB; border-radius: 5px; padding: 0.4rem 0.6rem; width: 180px; }
    .approve-field input.short { width: 110px; }
    .approve-field input:focus { outline: 2px solid #1A1A1A; outline-offset: 1px; }

    /* Inline edit form */
    .edit-form { display: none; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 6px; padding: 1rem; margin-bottom: 0.85rem; }
    .edit-form.open { display: block; }
    .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1rem; }
    @media (max-width: 560px) { .edit-grid { grid-template-columns: 1fr; } }
    .edit-field { display: flex; flex-direction: column; gap: 0.2rem; }
    .edit-field.full { grid-column: 1 / -1; }
    .edit-field label { font-size: 0.75rem; font-weight: 600; color: #555; }
    .edit-field input, .edit-field textarea, .edit-field select {
      font-family: inherit; font-size: 0.875rem; border: 1px solid #D1D5DB;
      border-radius: 5px; padding: 0.4rem 0.6rem; background: #fff; color: #1A1A1A;
    }
    .edit-field input:focus, .edit-field textarea:focus { outline: 2px solid #1A1A1A; outline-offset: 1px; }
    .edit-field textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
    .edit-actions { display: flex; gap: 0.6rem; align-items: center; margin-top: 0.85rem; }

    /* Action buttons */
    .sub-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
    .btn-approve   { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #fff; background: #15803D; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-approve:disabled   { opacity: 0.45; cursor: not-allowed; }
    .btn-reject    { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #991B1B; background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-reject:disabled    { opacity: 0.45; cursor: not-allowed; }
    .btn-edit      { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #1E40AF; background: #EFF6FF; border: 1px solid #93C5FD; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-edit:disabled      { opacity: 0.45; cursor: not-allowed; }
    .btn-save      { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #fff; background: #1A1A1A; border: none; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-save:disabled      { opacity: 0.45; cursor: not-allowed; }
    .btn-cancel    { font-family: inherit; font-size: 0.875rem; font-weight: 400; color: #555; background: none; border: 1px solid #D1D5DB; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-unpublish { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #92400E; background: #FFFBEB; border: 1px solid #FCD34D; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-unpublish:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-delete    { font-family: inherit; font-size: 0.875rem; font-weight: 600; color: #991B1B; background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 6px; padding: 0.5rem 1rem; cursor: pointer; }
    .btn-delete:disabled    { opacity: 0.45; cursor: not-allowed; }
    .sub-action-msg { font-size: 0.8125rem; color: #666; }

    .empty-state { color: #666; font-size: 0.9375rem; padding: 1.5rem 0; }
  </style>
</head>
<body>

<div style="display:flex;align-items:baseline;gap:1.5rem;margin-bottom:0.25rem;">
  <h1 style="margin-bottom:0;display:flex;align-items:center;gap:0.4rem;"><img src="elpys-logo-mark.svg" style="height:22px;width:auto;display:block;" alt="" aria-hidden="true">Elpys Admin</h1>
  <a href="index.html" style="font-size:0.875rem;color:#6B7280;text-decoration:none;">← Home</a>
</div>
<p class="subtitle">Review pending submissions and manage published listings</p>

<div id="login-panel">
  <div class="login-row">
    <input type="password" id="password-input" placeholder="Admin password" autocomplete="current-password" />
    <button class="btn-primary" id="login-btn">Load</button>
  </div>
  <div class="msg" id="login-msg"></div>
</div>

<nav id="section-nav">
  <a href="#submissions-panel">Pending <span id="nav-pending-badge"></span></a>
  <a href="#published-panel">Published <span id="nav-published-badge"></span></a>
  <a href="#feedback-panel">Feedback <span id="nav-feedback-badge"></span></a>
</nav>

<div id="submissions-panel">
  <div class="section-header">
    <h2>Pending submissions</h2>
    <span class="count-badge" id="count-badge">0</span>
  </div>
  <div id="submissions-list"></div>
</div>

<div id="published-panel">
  <div class="section-header">
    <h2>Published listings</h2>
    <span class="count-badge" id="published-count-badge">0</span>
  </div>
  <div id="published-list"></div>
</div>

<div id="feedback-panel">
  <div class="section-header">
    <h2>Feedback</h2>
    <span class="count-badge" id="feedback-count-badge">0</span>
  </div>
  <div id="feedback-list"></div>
</div>

<script>
  const API = '/api/admin';
  let _password = '';

  // ── Login ──────────────────────────────────────────────────────────────────

  document.getElementById('login-btn').addEventListener('click', loadAll);
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadAll();
  });

  async function loadAll() {
    _password = document.getElementById('password-input').value;
    if (!_password) { showLoginMsg('Enter a password.', 'error'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Loading…';

    try {
      const res = await fetch(API, { headers: { 'x-admin-password': _password } });
      if (res.status === 401) { showLoginMsg('Incorrect password.', 'error'); return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);

      const { pending, published, feedback } = await res.json();
      document.getElementById('login-panel').style.display = 'none';
      renderPending(pending);
      renderPublished(published);
      renderFeedback(feedback || []);
      document.getElementById('submissions-panel').style.display = 'block';
      document.getElementById('published-panel').style.display = 'block';
      document.getElementById('feedback-panel').style.display = 'block';
      const nav = document.getElementById('section-nav');
      nav.style.display = 'flex';
      document.getElementById('nav-pending-badge').textContent   = '(' + pending.length + ')';
      document.getElementById('nav-published-badge').textContent = '(' + published.length + ')';
      document.getElementById('nav-feedback-badge').textContent  = '(' + (feedback || []).length + ')';
    } catch (err) {
      showLoginMsg('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Load';
    }
  }

  function showLoginMsg(msg, type) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.className = 'msg ' + type;
  }

  // ── Pending ────────────────────────────────────────────────────────────────

  function renderPending(rows) {
    document.getElementById('count-badge').textContent = rows.length;
    const list = document.getElementById('submissions-list');
    if (rows.length === 0) { list.innerHTML = '<p class="empty-state">No pending submissions right now.</p>'; return; }
    list.innerHTML = '';
    rows.forEach(row => list.appendChild(buildPendingCard(row)));
  }

  function buildPendingCard(row) {
    const card = document.createElement('div');
    card.className = 'submission-card';
    card.id = 'card-' + row.id;

    const steps = Array.isArray(row.signup_steps) ? row.signup_steps : [];
    const stepsHtml = steps.length ? '<ol class="sub-steps">' + steps.map(s => '<li>' + esc(s) + '</li>').join('') + '</ol>' : '';
    const noteHtml      = row.card_note   ? '<p class="sub-note">' + esc(row.card_note) + '</p>' : '';
    const adminNoteHtml = row.admin_notes ? '<p style="font-size:0.8125rem;background:#FFFBEB;border:1px solid #FCD34D;border-radius:5px;padding:0.5rem 0.75rem;margin-bottom:0.75rem;"><strong>Admin note:</strong> ' + esc(row.admin_notes) + '</p>' : '';

    card.innerHTML =
      '<div class="sub-name">' + esc(row.name) + '</div>' +
      '<div class="sub-meta">' +
        '<span>' + esc(row.category || '—') + '</span>' +
        '<span>Age: ' + esc(row.age_display || '—') + '</span>' +
        '<span>When: ' + esc(row['when'] || '—') + '</span>' +
        '<span>Where: ' + esc(row['where'] || '—') + '</span>' +
        '<span>Section: ' + esc(row.section || '—') + '</span>' +
      '</div>' +
      '<p class="sub-desc">' + esc(row.description || '') + '</p>' +
      (row.detail_description ? '<p style="font-size:0.8125rem;font-weight:600;margin:0.5rem 0 0.2rem;">Full description</p><p class="sub-desc" style="color:#555;">' + esc(row.detail_description) + '</p>' : '') +
      '<p style="font-size:0.8125rem;font-weight:600;margin-bottom:0.3rem;">Sign-up steps</p>' +
      stepsHtml + noteHtml + adminNoteHtml +
      '<div class="sub-links">' +
        '<a href="' + esc(row.signup_link || '#') + '" target="_blank" rel="noopener">Sign-up link ↗</a>' +
        '<span style="color:#999;font-size:0.8125rem;">Submitted: ' + (row.created_at ? new Date(row.created_at).toLocaleDateString() : '—') + '</span>' +
      '</div>' +
      '<div class="approve-fields">' +
        '<p>Fill in before approving</p>' +
        '<div class="approve-row">' +
          '<div class="approve-field"><label for="slug-' + row.id + '">Slug</label><input id="slug-' + row.id + '" type="text" placeholder="e.g. food-lifeline" value="' + esc(autoSlug(row.name)) + '" /></div>' +
          '<div class="approve-field"><label for="lat-' + row.id + '">Latitude</label><input id="lat-' + row.id + '" type="text" class="short" placeholder="e.g. 47.6264" /></div>' +
          '<div class="approve-field"><label for="lng-' + row.id + '">Longitude</label><input id="lng-' + row.id + '" type="text" class="short" placeholder="e.g. -122.2054" /></div>' +
        '</div>' +
      '</div>' +
      '<div class="sub-actions">' +
        '<button class="btn-approve">Approve</button>' +
        '<button class="btn-reject">Reject</button>' +
        '<span class="sub-action-msg" id="msg-' + row.id + '"></span>' +
      '</div>';

    card.querySelector('.btn-approve').addEventListener('click', () => handleApprove(row.id));
    card.querySelector('.btn-reject').addEventListener('click',  () => handleReject(row.id));
    return card;
  }

  async function handleApprove(id) {
    const slug = document.getElementById('slug-' + id).value.trim();
    const lat  = document.getElementById('lat-'  + id).value.trim();
    const lng  = document.getElementById('lng-'  + id).value.trim();
    if (!slug || !lat || !lng) { setCardMsg(id, 'Fill in slug, lat, and lng first.', '#991B1B'); return; }
    if (isNaN(parseFloat(lat)) || isNaN(parseFloat(lng))) { setCardMsg(id, 'Lat and lng must be numbers.', '#991B1B'); return; }

    setCardBtns(id, true); setCardMsg(id, 'Approving…', '#555');
    try {
      const res  = await postAction({ action: 'approve', id, slug, lat: parseFloat(lat), lng: parseFloat(lng) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'HTTP ' + res.status);
      setCardMsg(id, data.emailSent ? 'Approved — confirmation email sent' : 'Approved', '#065F46');
      setTimeout(() => fadeRemove('card-' + id, checkPendingEmpty), 1500);
    } catch (err) { setCardMsg(id, 'Error: ' + err.message, '#991B1B'); setCardBtns(id, false); }
  }

  async function handleReject(id) {
    if (!confirm('Delete this submission permanently?')) return;
    setCardBtns(id, true); setCardMsg(id, 'Deleting…', '#555');
    try {
      const res = await postAction({ action: 'reject', id });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fadeRemove('card-' + id, checkPendingEmpty);
      adjustBadge('count-badge', -1);
    } catch (err) { setCardMsg(id, 'Error: ' + err.message, '#991B1B'); setCardBtns(id, false); }
  }

  function checkPendingEmpty() {
    const list = document.getElementById('submissions-list');
    if (list.querySelectorAll('.submission-card').length === 0) {
      list.innerHTML = '<p class="empty-state">No pending submissions right now.</p>';
      document.getElementById('count-badge').textContent = '0';
    }
  }

  // ── Published ──────────────────────────────────────────────────────────────

  function renderPublished(rows) {
    document.getElementById('published-count-badge').textContent = rows.length;
    const list = document.getElementById('published-list');
    if (rows.length === 0) { list.innerHTML = '<p class="empty-state">No published listings yet.</p>'; return; }
    list.innerHTML = '';
    rows.forEach(row => list.appendChild(buildPublishedCard(row)));
  }

  function buildPublishedCard(row) {
    const card = document.createElement('div');
    card.className = 'submission-card';
    card.id = 'card-' + row.id;

    const stepsText = Array.isArray(row.signup_steps) ? row.signup_steps.join('\n') : '';

    card.innerHTML =
      '<div class="sub-name">' + esc(row.name) + '</div>' +
      '<div class="sub-meta">' +
        '<span>' + esc(row.category || '—') + '</span>' +
        '<span>Age: ' + esc(row.age_display || '—') + '</span>' +
        '<span>When: ' + esc(row['when'] || '—') + '</span>' +
        '<span>Where: ' + esc(row['where'] || '—') + '</span>' +
        '<span>Slug: ' + esc(row.slug || '—') + '</span>' +
        '<span>Lat: ' + esc(row.lat != null ? row.lat : '—') + '</span>' +
        '<span>Lng: ' + esc(row.lng != null ? row.lng : '—') + '</span>' +
      '</div>' +

      // ── Inline edit form ──
      '<div class="edit-form" id="edit-' + row.id + '">' +
        '<div class="edit-grid">' +
          ef('Name',          'text',     'e-name-'    + row.id, esc(row.name || '')) +
          ef('Category',      'text',     'e-cat-'     + row.id, esc(row.category || '')) +
          ef('Age display',   'text',     'e-age-'     + row.id, esc(row.age_display || '')) +
          ef('Age min',       'number',   'e-agemin-'  + row.id, esc(row.age_min != null ? row.age_min : '')) +
          ef('When',          'text',     'e-when-'    + row.id, esc(row['when'] || '')) +
          ef('Where',         'text',     'e-where-'   + row.id, esc(row['where'] || '')) +
          ef('Address',       'text',     'e-addr-'    + row.id, esc(row.address || '')) +
          ef('Slug',          'text',     'e-slug-'    + row.id, esc(row.slug || '')) +
          ef('Latitude',      'text',     'e-lat-'     + row.id, esc(row.lat != null ? row.lat : '')) +
          ef('Longitude',     'text',     'e-lng-'     + row.id, esc(row.lng != null ? row.lng : '')) +
          ef('Sign-up link',  'text',     'e-link-'    + row.id, esc(row.signup_link || '')) +
          ef('Sign-up label', 'text',     'e-label-'   + row.id, esc(row.signup_label || '')) +
          efSelect('Section', 'e-section-' + row.id, row.section || 'online') +
          efArea('Card description', 'e-desc-' + row.id, esc(row.description || ''), false) +
          efArea('Full description (detail page)', 'e-detaildesc-' + row.id, esc(row.detail_description || ''), false) +
          efArea('Sign-up steps (one per line)', 'e-steps-' + row.id, esc(stepsText), false) +
          efArea('Card note', 'e-note-' + row.id, esc(row.card_note || ''), false) +
          efArea('Admin notes (not shown on site)', 'e-adminnotes-' + row.id, esc(row.admin_notes || ''), false) +
        '</div>' +
        '<div class="edit-actions">' +
          '<button class="btn-save">Save changes</button>' +
          '<button class="btn-cancel">Cancel</button>' +
          '<span class="sub-action-msg" id="msg-' + row.id + '"></span>' +
        '</div>' +
      '</div>' +

      '<div class="sub-actions" id="actions-' + row.id + '">' +
        '<button class="btn-edit">Edit</button>' +
        '<button class="btn-unpublish">Unpublish</button>' +
        '<button class="btn-delete">Delete permanently</button>' +
        '<span class="sub-action-msg" id="msg2-' + row.id + '"></span>' +
      '</div>';

    card.querySelector('.btn-edit').addEventListener('click',      () => toggleEdit(row.id));
    card.querySelector('.btn-save').addEventListener('click',      () => handleSave(row.id));
    card.querySelector('.btn-cancel').addEventListener('click',    () => toggleEdit(row.id, false));
    card.querySelector('.btn-unpublish').addEventListener('click', () => handleUnpublish(row));
    card.querySelector('.btn-delete').addEventListener('click',    () => handleDelete(row.id, row.name));
    return card;
  }

  // Small helpers for building edit form fields
  function ef(label, type, id, value) {
    return '<div class="edit-field"><label for="' + id + '">' + label + '</label>' +
           '<input id="' + id + '" type="' + type + '" value="' + value + '" /></div>';
  }
  function efArea(label, id, value, full) {
    return '<div class="edit-field' + (full ? ' full' : ' full') + '">' +
           '<label for="' + id + '">' + label + '</label>' +
           '<textarea id="' + id + '">' + value + '</textarea></div>';
  }
  function efSelect(label, id, value) {
    const opts = ['online','contact'].map(v =>
      '<option value="' + v + '"' + (v === value ? ' selected' : '') + '>' + v + '</option>'
    ).join('');
    return '<div class="edit-field"><label for="' + id + '">' + label + '</label>' +
           '<select id="' + id + '">' + opts + '</select></div>';
  }

  function toggleEdit(id, forceOpen) {
    const form    = document.getElementById('edit-' + id);
    const actions = document.getElementById('actions-' + id);
    const open    = forceOpen !== undefined ? forceOpen : !form.classList.contains('open');
    form.classList.toggle('open', open);
    actions.querySelector('.btn-edit').textContent = open ? 'Close' : 'Edit';
  }

  async function handleSave(id) {
    const g = fid => document.getElementById(fid).value;
    const stepsRaw = g('e-steps-' + id).split('\n').map(s => s.trim()).filter(Boolean);

    const payload = {
      action:       'update',
      id,
      name:         g('e-name-'    + id).trim(),
      description:        g('e-desc-'       + id).trim(),
      detail_description: g('e-detaildesc-' + id).trim() || null,
      category:     g('e-cat-'     + id).trim(),
      age_display:  g('e-age-'     + id).trim(),
      age_min:      g('e-agemin-'  + id) ? parseInt(g('e-agemin-' + id), 10) : null,
      'when':       g('e-when-'    + id).trim(),
      'where':      g('e-where-'   + id).trim(),
      address:      g('e-addr-'    + id).trim(),
      slug:         g('e-slug-'    + id).trim(),
      lat:          parseFloat(g('e-lat-' + id)) || null,
      lng:          parseFloat(g('e-lng-' + id)) || null,
      signup_link:  g('e-link-'   + id).trim(),
      signup_label: g('e-label-'  + id).trim() || null,
      signup_steps: stepsRaw,
      section:      g('e-section-' + id),
      card_note:    g('e-note-'       + id).trim() || null,
      admin_notes:  g('e-adminnotes-' + id).trim() || null,
    };

    const saveBtn = document.getElementById('edit-' + id).querySelector('.btn-save');
    saveBtn.disabled = true;
    setCardMsg(id, 'Saving…', '#555');

    try {
      const res = await postAction(payload);
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || 'HTTP ' + res.status); }
      setCardMsg(id, '✓ Saved.', '#15803D');
      // Update the visible name and meta in the card header
      const card = document.getElementById('card-' + id);
      card.querySelector('.sub-name').textContent = payload.name;
      setTimeout(() => setCardMsg(id, '', '#666'), 3000);
    } catch (err) {
      setCardMsg(id, 'Error: ' + err.message, '#991B1B');
    } finally {
      saveBtn.disabled = false;
    }
  }

  async function handleUnpublish(row) {
    const id = row.id, name = row.name;
    if (!confirm('Move "' + name + '" back to pending? It will be hidden from the public site immediately.')) return;
    setPublishedBtns(id, true); setCardMsg2(id, 'Unpublishing…', '#555');
    try {
      const res = await postAction({ action: 'unpublish', id });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fadeRemove('card-' + id, checkPublishedEmpty);
      adjustBadge('published-count-badge', -1);
      // Immediately add to pending section
      const pendingList = document.getElementById('submissions-list');
      const empty = pendingList.querySelector('.empty-state');
      if (empty) empty.remove();
      pendingList.insertBefore(buildPendingCard(row), pendingList.firstChild);
      adjustBadge('count-badge', 1);
    } catch (err) { setCardMsg2(id, 'Error: ' + err.message, '#991B1B'); setPublishedBtns(id, false); }
  }

  async function handleDelete(id, name) {
    if (!confirm('Delete "' + name + '" permanently? This cannot be undone.')) return;
    setPublishedBtns(id, true); setCardMsg2(id, 'Deleting…', '#555');
    try {
      const res = await postAction({ action: 'delete', id });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fadeRemove('card-' + id, checkPublishedEmpty);
      adjustBadge('published-count-badge', -1);
    } catch (err) { setCardMsg2(id, 'Error: ' + err.message, '#991B1B'); setPublishedBtns(id, false); }
  }

  function checkPublishedEmpty() {
    const list = document.getElementById('published-list');
    if (list.querySelectorAll('.submission-card').length === 0) {
      list.innerHTML = '<p class="empty-state">No published listings yet.</p>';
      document.getElementById('published-count-badge').textContent = '0';
    }
  }

  // ── Shared helpers ─────────────────────────────────────────────────────────

  function postAction(body) {
    return fetch(API, {
      method: 'POST',
      headers: { 'x-admin-password': _password, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  }

  function fadeRemove(cardId, callback) {
    const card = document.getElementById(cardId);
    card.style.transition = 'opacity 0.3s';
    card.style.opacity = '0';
    setTimeout(() => { card.remove(); if (callback) callback(); }, 300);
  }

  function adjustBadge(badgeId, delta) {
    const badge = document.getElementById(badgeId);
    badge.textContent = Math.max(0, parseInt(badge.textContent, 10) + delta);
  }

  function setCardBtns(id, disabled) {
    document.getElementById('card-' + id).querySelectorAll('button').forEach(b => b.disabled = disabled);
  }

  function setPublishedBtns(id, disabled) {
    document.getElementById('actions-' + id).querySelectorAll('button').forEach(b => b.disabled = disabled);
  }

  // msg inside the edit form
  function setCardMsg(id, msg, color) {
    const el = document.getElementById('msg-' + id);
    if (!el) return;
    el.textContent = msg;
    el.style.color = color;
  }

  // msg in the main action row (unpublish/delete)
  function setCardMsg2(id, msg, color) {
    const el = document.getElementById('msg2-' + id);
    if (!el) return;
    el.textContent = msg;
    el.style.color = color;
  }

  function autoSlug(name) {
    return (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  // ── Feedback ───────────────────────────────────────────────────────────────

  function renderFeedback(rows) {
    document.getElementById('feedback-count-badge').textContent = rows.length;
    const list = document.getElementById('feedback-list');
    if (rows.length === 0) { list.innerHTML = '<p class="empty-state">No feedback yet.</p>'; return; }
    list.innerHTML = '';
    rows.forEach(row => list.appendChild(buildFeedbackCard(row)));
  }

  function buildFeedbackCard(row) {
    const card = document.createElement('div');
    card.className = 'feedback-card';
    card.id = 'fb-' + row.id;

    const date = row.created_at ? new Date(row.created_at).toLocaleString() : '—';
    const pageHtml = row.page_url
      ? '<span>Page: <a href="' + esc(row.page_url) + '" target="_blank" rel="noopener">' + esc(row.page_url) + '</a></span>'
      : '';
    const emailHtml = row.contact_email
      ? '<span>Email: <a href="mailto:' + esc(row.contact_email) + '">' + esc(row.contact_email) + '</a></span>'
      : '';

    card.innerHTML =
      '<p class="fb-message">' + esc(row.message) + '</p>' +
      '<div class="fb-meta">' +
        '<span>' + esc(date) + '</span>' +
        pageHtml + emailHtml +
      '</div>' +
      '<div class="sub-actions">' +
        '<button class="btn-delete btn-delete-fb">Delete</button>' +
      '</div>';

    card.querySelector('.btn-delete-fb').addEventListener('click', () => handleDeleteFeedback(row.id));
    return card;
  }

  async function handleDeleteFeedback(id) {
    if (!confirm('Delete this feedback permanently?')) return;
    const btn = document.querySelector('#fb-' + id + ' .btn-delete-fb');
    if (btn) btn.disabled = true;
    try {
      const res = await postAction({ action: 'delete-feedback', id });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      fadeRemove('fb-' + id, () => {
        adjustBadge('feedback-count-badge', -1);
        const list = document.getElementById('feedback-list');
        if (list.querySelectorAll('.feedback-card').length === 0) {
          list.innerHTML = '<p class="empty-state">No feedback yet.</p>';
          document.getElementById('feedback-count-badge').textContent = '0';
        }
      });
    } catch (err) {
      if (btn) btn.disabled = false;
      alert('Error: ' + err.message);
    }
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
